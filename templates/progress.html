<!DOCTYPE html>
<html>

<head>
    <title>Progress</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <div class="container">
        <div class="card">

            <h1>Progress</h1>

            <form method="GET">
                <label>Select Exercise</label>
                <select name="exercise_id" required>
                    {% for exercise in exercises %}
                    <option value="{{ exercise.exercise_id }}" {% if selected_id==exercise.exercise_id %}selected{%
                        endif %}>
                        {{ exercise.name }}
                    </option>
                    {% endfor %}
                </select>

                <button type="submit">View Progress</button>
            </form>

            {% if labels and values %}
            <div class="chart-container">
                <canvas id="progressChart" data-labels='{{ labels | tojson | safe }}'
                    data-values='{{ values | tojson | safe }}'>
                </canvas>
            </div>
            {% else %}
            <p class="small" style="margin-top:12px;">
                No workout data available for this exercise yet.
            </p>
            {% endif %}

            <a class="btn btn-secondary" href="{{ url_for('dashboard') }}" style="margin-top:14px;">
                Back to Dashboard
            </a>

        </div>
    </div>

    <script>
        (() => {
            const canvas = document.getElementById("progressChart");
            if (!canvas) return;

            const chartLabels = JSON.parse(canvas.getAttribute("data-labels") || "[]");
            const chartValues = JSON.parse(canvas.getAttribute("data-values") || "[]");

            if (!chartLabels.length) return;

            const ctx = canvas.getContext("2d");

            if (window.__progressChart) {
                window.__progressChart.destroy();
            }

            window.__progressChart = new Chart(ctx, {
                type: "line",
                data: {
                    labels: chartLabels,
                    datasets: [{
                        label: "Progress",
                        data: chartValues,
                        borderColor: "#2563eb",
                        backgroundColor: "rgba(37,99,235,0.1)",
                        tension: 0.3,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: false
                        }
                    }
                }
            });
        })();
    </script>

</body>

</html>
